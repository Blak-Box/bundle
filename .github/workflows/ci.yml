name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

      # The library must build and pass under the FIPS 140-3 Go module
      # (GOFIPS140=v1.0.0, CMVP #5247) — the appliance ships in FIPS mode.
      # ML-DSA-87 runs here as a non-validated hedge algorithm.
      - name: test (FIPS 140-3 module)
        run: GOFIPS140=v1.0.0 go test ./...

      # The phase-1 TRUST path (ECDSA-P384 + AES-256-GCM STREAM + ECDH keywrap)
      # must additionally pass the STRICT fips140=only runtime, which rejects
      # every non-approved algorithm. This is what proves the STREAM uses a
      # FIPS-safe random nonce (a counter/deterministic nonce would fail here)
      # and that no approved-path code slipped in a non-validated primitive.
      # ML-DSA-87 is deliberately EXCLUDED: it is not in the validated module
      # (a phase-2 hedge, AU-side) and is not a validated-PQC claim until the
      # module certifies it (~2027).
      - name: strict FIPS (approved path only)
        run: >-
          GOFIPS140=v1.0.0 GODEBUG=fips140=only
          go test -run '^(TestSignVerify|TestVerifyRejects|TestSignRejects|TestStream|TestKeywrap|TestWrap|TestUnwrap|TestPolicy|TestMode|TestSealOpen|TestCLI|TestSegment)' ./...

      # The appliance is aarch64 (GB10 / DGX OS 7): every shippable binary
      # must cross-compile for it under the FIPS module. Build-plan Sprint-1
      # named this smoke; the Makefile targets alone are not a CI gate.
      - name: cross-compile linux/arm64 (FIPS)
        run: |
          GOOS=linux GOARCH=arm64 GOFIPS140=v1.0.0 go build ./...
          GOOS=linux GOARCH=amd64 GOFIPS140=v1.0.0 go build ./...
